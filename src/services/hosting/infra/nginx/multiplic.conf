# ──────────────────────────────────────────────────────────────────────────────
# TLS — wildcard certificate covers *.aiistech.com + aiistech.com
# Cert management: provision with certbot --dns and renew via cron
# ──────────────────────────────────────────────────────────────────────────────

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name aiistech.com *.aiistech.com;
    return 301 https://$host$request_uri;
}

# ──────────────────────────────────────────────────────────────────────────────
# aiistech.com — WordPress (PHP-FPM)
# Nginx serves WP directly; does NOT pass through Multiplic Node process
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name aiistech.com;

    ssl_certificate     /etc/letsencrypt/live/aiistech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiistech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/aiistech-wp;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php8.1-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# api.aiistech.com — Express API (port 3001); bypasses Multiplic Node process
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.aiistech.com;

    ssl_certificate     /etc/letsencrypt/live/aiistech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiistech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# app.aiistech.com + dashboard.aiistech.com + *.aiistech.com project nodes
# All routed through Multiplic Node process (port 3000)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name app.aiistech.com dashboard.aiistech.com ~^[a-z0-9][a-z0-9-]+\.aiistech\.com$;

    ssl_certificate     /etc/letsencrypt/live/aiistech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiistech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# Fallback — all other domains → Multiplic Node (existing citizengardens etc.)
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    server_name ~^(.+)$;

    ssl_certificate     /etc/letsencrypt/live/aiistech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aiistech.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ──────────────────────────────────────────────────────────────────────────────
# Sync endpoint on :9000 — INTERNAL ONLY, never expose to public
# Only allow from GitHub Actions IP ranges
# Node sync server listens on 9001 (internal); Nginx applies IP filtering here
# ──────────────────────────────────────────────────────────────────────────────
server {
    listen 9000;
    allow  192.30.252.0/22;
    allow  185.199.108.0/22;
    deny   all;

    location /sync {
        proxy_pass http://127.0.0.1:9001;
    }
}
